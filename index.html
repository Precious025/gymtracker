<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Gym Tracker — 3 Months</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --push: #1A6BB5;
    --push-light: #E6F1FB;
    --push-dark: #0C3A6B;
    --pull: #6B3DBA;
    --pull-light: #F0EBFF;
    --pull-dark: #3B1F70;
    --legs: #2A8A3E;
    --legs-light: #E6F5EA;
    --legs-dark: #154D22;
    --bg: #0F0F0F;
    --surface: #1A1A1A;
    --surface2: #242424;
    --border: #2E2E2E;
    --text: #F0EDE8;
    --muted: #888;
    --accent: #F5C842;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 2rem;
    flex-wrap: wrap;
  }
  .site-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: 0.04em;
    line-height: 0.9;
    color: var(--text);
  }
  .site-header h1 span { color: var(--accent); }
  .header-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-bottom: 6px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .pill.push { border-color: var(--push); color: #6AAEE8; }
  .pill.pull { border-color: var(--pull); color: #A980F5; }
  .pill.legs { border-color: var(--legs); color: #6EC87F; }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap {
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .progress-label { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }
  .progress-track {
    flex: 1;
    min-width: 200px;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .progress-count { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--accent); white-space: nowrap; }

  /* ── MONTH NAV ── */
  .month-nav {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .month-nav::-webkit-scrollbar { display: none; }
  .month-btn {
    flex: 1;
    min-width: 120px;
    padding: 1rem 1.5rem;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .month-btn:hover { color: var(--text); }
  .month-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .month-btn .month-prog {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .month-btn.active .month-prog { color: var(--accent); }

  /* ── MAIN LAYOUT ── */
  .main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  .month-view { display: none; }
  .month-view.active { display: block; }

  .month-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 0.5rem;
    flex-wrap: wrap;
  }
  .month-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.06em;
  }
  .month-subtitle { font-size: 13px; color: var(--muted); }

  /* ── WEEK GRID ── */
  .weeks { display: flex; flex-direction: column; gap: 2rem; margin-top: 1.5rem; }
  .week-block {}
  .week-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    font-family: 'DM Mono', monospace;
  }
  .week-sessions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
  }

  /* ── SESSION CARD ── */
  .session-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .session-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .session-card.completed { border-color: transparent; }
  .session-card.completed.push-card { border-color: rgba(26,107,181,0.4); }
  .session-card.completed.pull-card { border-color: rgba(107,61,186,0.4); }
  .session-card.completed.legs-card { border-color: rgba(42,138,62,0.4); }

  .card-header {
    padding: 10px 14px 9px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .push-card .card-header { background: var(--push); }
  .pull-card .card-header { background: var(--pull); }
  .legs-card .card-header { background: var(--legs); }

  .card-header-left {}
  .card-type {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 0.06em;
    color: #fff;
    line-height: 1;
  }
  .card-focus {
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
    letter-spacing: 0.04em;
  }
  .session-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.6);
  }

  /* ── EXERCISES LIST ── */
  .exercises { padding: 0 14px; }

  .ex-section-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 0 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }

  .ex-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
  }
  .ex-item:last-child { border-bottom: none; }
  .ex-item:hover { opacity: 0.85; }

  /* Custom checkbox */
  .ex-check {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: transparent;
    position: relative;
  }
  .push-card .ex-check.checked { background: var(--push); border-color: var(--push); }
  .pull-card .ex-check.checked { background: var(--pull); border-color: var(--pull); }
  .legs-card .ex-check.checked { background: var(--legs); border-color: var(--legs); }
  .ex-check.checked::after {
    content: '';
    width: 8px;
    height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  .ex-name {
    flex: 1;
    font-size: 12px;
    color: var(--text);
    line-height: 1.4;
    transition: color 0.15s;
  }
  .ex-item.done .ex-name { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--border); }
  .ex-sets {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .push-card .ex-sets { color: #6AAEE8; }
  .pull-card .ex-sets { color: #A980F5; }
  .legs-card .ex-sets { color: #6EC87F; }

  /* ── SESSION FOOTER ── */
  .session-footer {
    padding: 10px 14px 12px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .notes-field {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--text);
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 8px;
  }
  .notes-field::placeholder { color: var(--muted); }
  .notes-field:focus { border-color: var(--muted); }

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .feeling-group { display: flex; gap: 4px; }
  .feeling-btn {
    padding: 3px 8px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .feeling-btn:hover { border-color: var(--text); color: var(--text); }
  .feeling-btn.active.great { background: #1a3a1e; border-color: var(--legs); color: #6EC87F; }
  .feeling-btn.active.ok { background: #2a2a10; border-color: #b0a020; color: var(--accent); }
  .feeling-btn.active.tough { background: #3a1a1a; border-color: #b04040; color: #e08080; }

  .mark-done-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .mark-done-btn:hover { border-color: var(--text); color: var(--text); }
  .session-card.completed .mark-done-btn {
    background: rgba(245,200,66,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── COMPLETION OVERLAY ── */
  .completion-badge {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(15,15,15,0.85);
    border-radius: 12px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    backdrop-filter: blur(2px);
    pointer-events: none;
  }
  .session-card.completed .completion-badge { display: flex; }
  .completion-badge .check-big {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    animation: pop 0.3s cubic-bezier(.4,0,.2,1);
  }
  .push-card .check-big { background: rgba(26,107,181,0.25); color: #6AAEE8; border: 2px solid var(--push); }
  .pull-card .check-big { background: rgba(107,61,186,0.25); color: #A980F5; border: 2px solid var(--pull); }
  .legs-card .check-big { background: rgba(42,138,62,0.25); color: #6EC87F; border: 2px solid var(--legs); }
  .completion-badge p { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; letter-spacing: 0.1em; color: var(--muted); }
  .session-card { position: relative; }

  /* If card is completed, still allow clicking footer */
  .session-card.completed .session-footer { position: relative; z-index: 10; }

  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .week-sessions { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 580px) {
    .main { padding: 1rem; }
    .week-sessions { grid-template-columns: 1fr; }
    .site-header { padding: 1.5rem 1rem 1rem; }
    .progress-bar-wrap { padding: 0.75rem 1rem; }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>

<header class="site-header">
  <h1>MY GYM<br><span>TRACKER</span></h1>
  <div class="header-meta">
    <span class="pill">3 months · 36 sessions</span>
    <span class="pill push">● Day A — Push</span>
    <span class="pill pull">● Day B — Pull</span>
    <span class="pill legs">● Day C — Legs</span>
  </div>
</header>

<div class="progress-bar-wrap">
  <span class="progress-label">Overall progress</span>
  <div class="progress-track"><div class="progress-fill" id="globalFill"></div></div>
  <span class="progress-count" id="globalCount">0 / 36 sessions</span>
</div>

<nav class="month-nav">
  <button class="month-btn active" onclick="showMonth(0)" id="mbtn-0">
    MONTH 1
    <span class="month-prog" id="mprog-0">0 / 12</span>
  </button>
  <button class="month-btn" onclick="showMonth(1)" id="mbtn-1">
    MONTH 2
    <span class="month-prog" id="mprog-1">0 / 12</span>
  </button>
  <button class="month-btn" onclick="showMonth(2)" id="mbtn-2">
    MONTH 3
    <span class="month-prog" id="mprog-2">0 / 12</span>
  </button>
</nav>

<main class="main" id="mainContent"></main>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const DAYS = [
  {
    id: 'push',
    label: 'Day A — Push',
    focus: 'Chest · Shoulders · Triceps',
    cardClass: 'push-card',
    sections: [
      { name: 'Warm-Up', exercises: [
        { name: 'Incline treadmill / bike', sets: '10 min' },
        { name: 'Arm circles + band pull-aparts', sets: '2 × 15' },
      ]},
      { name: 'Main Lifts', exercises: [
        { name: 'Barbell bench press', sets: '4 × 5' },
        { name: 'Overhead press', sets: '3 × 6' },
      ]},
      { name: 'Accessory', exercises: [
        { name: 'Incline dumbbell press', sets: '3 × 10' },
        { name: 'Cable lateral raises', sets: '3 × 15' },
        { name: 'Triceps rope pushdowns', sets: '3 × 12' },
      ]},
      { name: 'Core', exercises: [
        { name: 'Ab wheel rollout / cable crunch', sets: '3 × 10' },
        { name: 'Plank hold', sets: '3 × 30s' },
      ]},
    ]
  },
  {
    id: 'pull',
    label: 'Day B — Pull',
    focus: 'Back · Biceps · Rear Delts',
    cardClass: 'pull-card',
    sections: [
      { name: 'Warm-Up', exercises: [
        { name: 'Rowing machine / bike', sets: '10 min' },
        { name: 'Cat-cow + thoracic rotation', sets: '2 × 10' },
      ]},
      { name: 'Main Lifts', exercises: [
        { name: 'Romanian deadlift', sets: '4 × 5' },
        { name: 'Pull-ups / lat pulldown', sets: '3 × 6–8' },
      ]},
      { name: 'Accessory', exercises: [
        { name: 'Seated cable row', sets: '3 × 10' },
        { name: 'Face pulls ⭐ posture key', sets: '4 × 15' },
        { name: 'Dumbbell bicep curls', sets: '3 × 12' },
      ]},
      { name: 'Core', exercises: [
        { name: 'Hanging knee raises / leg raise', sets: '3 × 12' },
        { name: 'Dead bug', sets: '3 × 10 each' },
      ]},
    ]
  },
  {
    id: 'legs',
    label: 'Day C — Legs',
    focus: 'Quads · Hamstrings · Glutes',
    cardClass: 'legs-card',
    sections: [
      { name: 'Warm-Up', exercises: [
        { name: 'Bike / light walk', sets: '10 min' },
        { name: 'Bodyweight squat + hip circles', sets: '2 × 15' },
      ]},
      { name: 'Main Lifts', exercises: [
        { name: 'Barbell back squat', sets: '4 × 5' },
        { name: 'Romanian deadlift (RDL)', sets: '3 × 8' },
      ]},
      { name: 'Accessory', exercises: [
        { name: 'Leg press', sets: '3 × 12' },
        { name: 'Walking lunges (dumbbell)', sets: '3 × 10 each' },
        { name: 'Leg curl machine', sets: '3 × 12' },
        { name: 'Standing calf raises', sets: '4 × 15' },
      ]},
      { name: 'Core', exercises: [
        { name: 'Cable woodchop / Russian twist', sets: '3 × 12 each' },
        { name: 'Glute bridge hold', sets: '3 × 30s' },
      ]},
    ]
  }
];

const MONTH_SUBTITLES = [
  'Weeks 1–4 · Re-adaptation: start at 60–70% weight, focus on form',
  'Weeks 5–8 · Linear progression: add 2.5 kg (upper) or 5 kg (lower) each session',
  'Weeks 9–12 · Push hard, then deload on week 12 at 60% weight',
];

// Build 36 sessions: Push/Pull/Legs repeating
const SESSIONS = [];
for (let i = 0; i < 36; i++) {
  SESSIONS.push({
    sessionNum: i + 1,
    month: Math.floor(i / 12),      // 0,1,2
    weekInMonth: Math.floor((i % 12) / 3), // 0,1,2,3
    day: DAYS[i % 3],
  });
}

// ── STATE ────────────────────────────────────────────────────────────────────
function loadState() {
  try { return JSON.parse(localStorage.getItem('gymTracker') || '{}'); }
  catch { return {}; }
}
function saveState(state) {
  localStorage.setItem('gymTracker', JSON.stringify(state));
}

let state = loadState();
// state[sessionNum] = { completed: bool, feeling: 'great'|'ok'|'tough'|null, notes: str, exercises: {exIdx: bool} }

function getSession(n) {
  if (!state[n]) state[n] = { completed: false, feeling: null, notes: '', exercises: {} };
  return state[n];
}

// ── BUILD UI ─────────────────────────────────────────────────────────────────
function buildCard(session) {
  const { sessionNum, month, weekInMonth, day } = session;
  const s = getSession(sessionNum);
  const totalEx = day.sections.reduce((a, sec) => a + sec.exercises.length, 0);

  let exRows = '';
  let exIndex = 0;
  day.sections.forEach(sec => {
    exRows += `<div class="ex-section-label">${sec.name}</div>`;
    sec.exercises.forEach(ex => {
      const checked = s.exercises[exIndex] ? 'checked' : '';
      const done = s.exercises[exIndex] ? 'done' : '';
      exRows += `
        <div class="ex-item ${done}" onclick="toggleEx(${sessionNum}, ${exIndex}, this)">
          <div class="ex-check ${checked}"></div>
          <span class="ex-name">${ex.name}</span>
          <span class="ex-sets">${ex.sets}</span>
        </div>`;
      exIndex++;
    });
  });

  const fGreat = s.feeling === 'great' ? 'active great' : '';
  const fOk    = s.feeling === 'ok'    ? 'active ok'    : '';
  const fTough = s.feeling === 'tough' ? 'active tough' : '';
  const completedClass = s.completed ? 'completed' : '';

  return `
    <div class="session-card ${day.cardClass} ${completedClass}" id="card-${sessionNum}">
      <div class="completion-badge">
        <div class="check-big">✓</div>
        <p>Session done</p>
      </div>
      <div class="card-header">
        <div class="card-header-left">
          <div class="card-type">${day.label}</div>
          <div class="card-focus">${day.focus}</div>
        </div>
        <div class="session-num">#${sessionNum}</div>
      </div>
      <div class="exercises">${exRows}</div>
      <div class="session-footer">
        <textarea class="notes-field" rows="2" placeholder="Weight used, notes..."
          oninput="saveNotes(${sessionNum}, this.value)">${s.notes || ''}</textarea>
        <div class="footer-row">
          <div class="feeling-group">
            <button class="feeling-btn ${fGreat}" onclick="setFeeling(${sessionNum},'great',this)">💪 Great</button>
            <button class="feeling-btn ${fOk}"    onclick="setFeeling(${sessionNum},'ok',this)">😐 OK</button>
            <button class="feeling-btn ${fTough}" onclick="setFeeling(${sessionNum},'tough',this)">😓 Tough</button>
          </div>
          <button class="mark-done-btn" onclick="toggleComplete(${sessionNum})">
            ${s.completed ? '✓ Completed' : 'Mark done'}
          </button>
        </div>
      </div>
    </div>`;
}

function buildAll() {
  const main = document.getElementById('mainContent');
  let html = '';
  [0,1,2].forEach(m => {
    html += `<div class="month-view ${m===0?'active':''}" id="month-${m}">
      <div class="month-header">
        <span class="month-title">Month ${m+1}</span>
        <span class="month-subtitle">${MONTH_SUBTITLES[m]}</span>
      </div>
      <div class="weeks">`;
    [0,1,2,3].forEach(w => {
      const weekSessions = SESSIONS.filter(s => s.month === m && s.weekInMonth === w);
      html += `<div class="week-block">
        <div class="week-label">Week ${m*4+w+1}</div>
        <div class="week-sessions">
          ${weekSessions.map(s => buildCard(s)).join('')}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  main.innerHTML = html;
}

// ── INTERACTIONS ─────────────────────────────────────────────────────────────
function toggleEx(sessionNum, exIndex, el) {
  const s = getSession(sessionNum);
  s.exercises[exIndex] = !s.exercises[exIndex];
  saveState(state);

  const check = el.querySelector('.ex-check');
  const name  = el.querySelector('.ex-name');
  if (s.exercises[exIndex]) {
    check.classList.add('checked');
    el.classList.add('done');
  } else {
    check.classList.remove('checked');
    el.classList.remove('done');
  }
}

function saveNotes(sessionNum, val) {
  const s = getSession(sessionNum);
  s.notes = val;
  saveState(state);
}

function setFeeling(sessionNum, feeling, btn) {
  const s = getSession(sessionNum);
  s.feeling = s.feeling === feeling ? null : feeling;
  saveState(state);

  const card = document.getElementById(`card-${sessionNum}`);
  card.querySelectorAll('.feeling-btn').forEach(b => b.className = 'feeling-btn');
  if (s.feeling) {
    btn.className = `feeling-btn active ${feeling}`;
  }
}

function toggleComplete(sessionNum) {
  const s = getSession(sessionNum);
  s.completed = !s.completed;
  saveState(state);

  const card = document.getElementById(`card-${sessionNum}`);
  const btn  = card.querySelector('.mark-done-btn');
  if (s.completed) {
    card.classList.add('completed');
    btn.textContent = '✓ Completed';
  } else {
    card.classList.remove('completed');
    btn.textContent = 'Mark done';
  }
  updateProgress();
}

function showMonth(idx) {
  document.querySelectorAll('.month-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`month-${idx}`).classList.add('active');
  document.getElementById(`mbtn-${idx}`).classList.add('active');
}

function updateProgress() {
  const total = 36;
  let done = 0;
  [0,1,2].forEach(m => {
    let monthDone = 0;
    SESSIONS.filter(s => s.month === m).forEach(s => {
      if (getSession(s.sessionNum).completed) { done++; monthDone++; }
    });
    document.getElementById(`mprog-${m}`).textContent = `${monthDone} / 12`;
  });
  document.getElementById('globalFill').style.width = `${(done/total)*100}%`;
  document.getElementById('globalCount').textContent = `${done} / ${total} sessions`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildAll();
updateProgress();
</script>
</body>
</html>
